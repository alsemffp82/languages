<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韓国語レッスン</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@400;700&display=swap');
    :root {
      --cream:#FDF6EE; --warm-pink:#E8827A; --soft-rose:#EDD5D0; --blush:#FAF0EC;
      --brown:#7B5B4C; --dark-brown:#4A3328; --sage:#7FB5A0; --soft-sage:#D8EDE6;
      --gold:#C9973A; --light-gold:#FFF5DC; --text:#2E1F18; --muted:#9E7E72;
      --kr-bg:#FFF8F0; --kr-border:#E8A090;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px;line-height:1.7;}
    header{background:linear-gradient(135deg,#C9604A 0%,#A84A60 100%);color:white;padding:30px 24px 24px;text-align:center;position:relative;overflow:hidden;}
    header::after{content:'✈️';position:absolute;font-size:90px;opacity:.1;right:-12px;bottom:-16px;}
    header .badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:11px;letter-spacing:1.5px;margin-bottom:12px;}
    header h1{font-size:22px;font-weight:700;line-height:1.4;}
    header .sub{font-size:13px;opacity:.8;margin-top:6px;}
    .progress-wrap{background:white;border-bottom:1px solid #EDE0D8;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
    .progress-label{font-size:12px;color:var(--muted);}
    .dots{display:flex;gap:7px;}
    .dot{width:9px;height:9px;border-radius:50%;background:#E0D4CC;transition:all .3s;}
    .dot.active{background:var(--warm-pink);transform:scale(1.3);}
    .dot.done{background:var(--sage);}
    .section{display:none;padding:28px 20px 100px;width:100%;animation:fadeIn .35s ease;}
    .section.visible{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @media(min-width:769px){
      .section{max-width:600px;margin:0 auto;}
      .nav{width:calc(600px - 40px);transform:translateX(-50%);left:50% !important;}
      .char-wrap{right:calc(50% - 320px);}
    }
    .step-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--warm-pink);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
    .step-label::after{content:'';flex:1;height:1px;background:var(--soft-rose);}
    .step-title{font-size:19px;font-weight:700;color:var(--dark-brown);margin-bottom:20px;}
    .card{background:white;border-radius:18px;padding:24px 20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.05);}
    .kr-block{background:var(--kr-bg);border:2px solid var(--kr-border);border-radius:16px;padding:24px 20px;text-align:center;margin-bottom:16px;}
    .kr-block .label{font-size:11px;color:var(--warm-pink);font-weight:700;letter-spacing:1px;margin-bottom:10px;}
    .kr-text{font-family:'Noto Sans KR',sans-serif;font-size:52px;font-weight:700;color:var(--dark-brown);line-height:1.1;}
    .reading{font-size:20px;color:var(--warm-pink);margin-top:8px;font-weight:500;letter-spacing:1px;}
    .meaning{font-size:15px;color:var(--muted);margin-top:6px;}
    .listen-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:16px;padding:13px;background:var(--warm-pink);color:white;border:none;border-radius:12px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;}
    .listen-btn:active{opacity:.85;transform:scale(.98);}
    .scene-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
    .scene-item{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:var(--blush);border-radius:12px;}
    .scene-item .icon{font-size:20px;flex-shrink:0;margin-top:1px;}
    .scene-item .text{font-size:14px;color:var(--text);line-height:1.6;}
    .compare-box{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid var(--soft-rose);border-radius:14px;overflow:hidden;margin-bottom:14px;}
    .compare-col{padding:16px;}
    .compare-col.jp-col{background:white;border-right:1px solid var(--soft-rose);}
    .compare-col.kr-col{background:var(--kr-bg);}
    .compare-col .col-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
    .compare-col .sentence{font-size:15px;font-weight:600;color:var(--dark-brown);line-height:1.6;white-space:pre-line;}
    .compare-col.kr-col .sentence{font-family:'Noto Sans KR',sans-serif;}
    .compare-col .ruby-text{font-size:13px;color:var(--warm-pink);margin-top:4px;}
    .arrow-row{text-align:center;font-size:13px;color:var(--muted);margin:8px 0 14px;}
    .insight{background:var(--light-gold);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:13px 15px;font-size:13px;color:var(--dark-brown);line-height:1.75;}
    .insight strong{color:var(--gold);}
    .vocab-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
    .vocab-pill{background:var(--blush);border-radius:10px;padding:8px 13px;font-size:13px;line-height:1.4;}
    .vocab-pill .kr{font-family:'Noto Sans KR',sans-serif;font-weight:700;color:var(--dark-brown);}
    .vocab-pill .jp{color:var(--muted);font-size:12px;}
    .pattern-frame{background:var(--kr-bg);border:2px solid var(--kr-border);border-radius:14px;padding:20px;text-align:center;margin-bottom:18px;}
    .pattern-frame .instruction{font-size:12px;color:var(--muted);margin-bottom:10px;}
    .pattern-frame .kr-big{font-family:'Noto Sans KR',sans-serif;font-size:30px;font-weight:700;color:var(--dark-brown);}
    .pattern-frame .p-reading{font-size:15px;color:var(--warm-pink);margin-top:5px;}
    .pattern-frame .p-jp{font-size:13px;color:var(--muted);margin-top:4px;}
    .word-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .word-btn{background:white;border:2px solid var(--soft-rose);border-radius:13px;padding:14px 12px;text-align:center;cursor:pointer;transition:all .18s;font-family:inherit;}
    .word-btn:hover{border-color:var(--warm-pink);transform:translateY(-1px);}
    .word-btn.selected{border-color:var(--warm-pink);background:var(--blush);}
    .word-btn .kr{font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:700;color:var(--dark-brown);}
    .word-btn .read{font-size:12px;color:var(--warm-pink);margin-top:3px;}
    .word-btn .jp{font-size:12px;color:var(--muted);}
    .result-box{display:none;margin-top:16px;background:var(--soft-sage);border-radius:14px;padding:18px;text-align:center;animation:fadeIn .3s ease;}
    .result-box.show{display:block;}
    .result-box .kr{font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:700;color:var(--dark-brown);}
    .result-box .read{font-size:14px;color:var(--sage);margin-top:5px;}
    .result-box .jp{font-size:13px;color:var(--muted);margin-top:5px;}
    .result-box .cheer{font-size:13px;color:var(--sage);font-weight:700;margin-top:10px;}
    .quiz-header{text-align:center;margin-bottom:20px;}
    .quiz-header .quiz-icon{font-size:36px;margin-bottom:10px;}
    .quiz-header .q-text{font-size:16px;font-weight:600;color:var(--dark-brown);margin-bottom:4px;}
    .quiz-header .q-sub{font-size:13px;color:var(--muted);}
    .option-list{display:flex;flex-direction:column;gap:10px;}
    .option-btn{display:flex;align-items:center;gap:12px;background:white;border:2px solid #E8DDD5;border-radius:13px;padding:14px 16px;cursor:pointer;transition:all .18s;font-family:inherit;text-align:left;}
    .option-btn:hover:not(.disabled){border-color:var(--warm-pink);}
    .option-btn .num{width:26px;height:26px;background:var(--blush);color:var(--brown);border-radius:50%;font-size:12px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .option-btn .kr-opt{font-family:'Noto Sans KR',sans-serif;font-size:17px;font-weight:700;color:var(--dark-brown);}
    .option-btn .read-opt{font-size:12px;color:var(--muted);margin-top:1px;}
    .option-btn.correct{border-color:var(--sage);background:var(--soft-sage);}
    .option-btn.wrong{border-color:#F0AAAA;background:#FFF3F3;}
    .q-result{display:none;margin-top:14px;border-radius:13px;padding:14px 16px;font-size:14px;line-height:1.7;animation:fadeIn .3s ease;}
    .q-result.show{display:block;}
    .q-result.ok{background:var(--soft-sage);color:#2E6B54;}
    .q-result.ng{background:#FFF3F3;color:#9B4040;}
    .q-result .big{font-size:24px;margin-bottom:6px;}
    .culture-card{border:1px solid var(--soft-rose);}
    .culture-icon{font-size:32px;margin-bottom:10px;}
    .culture-title{font-size:16px;font-weight:700;color:var(--dark-brown);margin-bottom:10px;}
    .culture-body{font-size:14px;color:var(--text);line-height:1.85;}
    .culture-body .hl{color:var(--warm-pink);font-weight:700;}
    .culture-body .kr-inline{font-family:'Noto Sans KR',sans-serif;font-weight:700;}
    .drama-box{background:#18182E;color:white;border-radius:14px;padding:20px 18px;margin-top:14px;}
    .drama-box .d-label{font-size:10px;letter-spacing:2px;color:#8888AA;margin-bottom:10px;}
    .drama-box .d-kr{font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:700;line-height:1.4;}
    .drama-box .d-read{font-size:15px;color:#E89090;margin-top:6px;}
    .drama-box .d-jp{font-size:14px;color:#AAAABB;margin-top:6px;}
    .drama-box .d-note{font-size:12px;color:#77778A;margin-top:10px;}
    .complete{text-align:center;padding:32px 16px 16px;}
    .complete .big{font-size:56px;margin-bottom:16px;}
    .complete h2{font-size:22px;font-weight:700;color:var(--dark-brown);margin-bottom:10px;}
    .complete p{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:22px;}
    .summary-list{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:24px;}
    .s-pill{background:white;border:1.5px solid var(--soft-rose);border-radius:20px;padding:8px 15px;font-size:13px;}
    .s-pill .kr{font-family:'Noto Sans KR',sans-serif;font-weight:700;color:var(--dark-brown);}
    .s-pill .read{color:var(--warm-pink);}
    .char-wrap{position:fixed;bottom:74px;right:20px;z-index:999;display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:none;}
    .char-bubble{background:white;border:1.5px solid var(--soft-rose);border-radius:14px 14px 4px 14px;padding:8px 12px;font-size:12px;color:var(--dark-brown);max-width:130px;text-align:center;line-height:1.5;box-shadow:0 2px 8px rgba(0,0,0,.10);display:none;}
    .char-bubble.show{display:block;animation:bubblePop .3s ease;}
    .char-img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(0,0,0,.18));animation:charBounce .4s ease;display:block;}
    @keyframes charBounce{0%{transform:translateY(14px);opacity:0}60%{transform:translateY(-5px);opacity:1}100%{transform:translateY(0);opacity:1}}
    @keyframes bubblePop{0%{transform:scale(.8) translateY(4px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
    .nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #EDE0D8;padding:14px 20px;display:flex;gap:10px;}
    .btn-back{flex:0 0 52px;height:50px;background:var(--blush);color:var(--brown);border:none;border-radius:13px;font-size:18px;cursor:pointer;}
    .btn-next{flex:1;height:50px;background:linear-gradient(135deg,var(--warm-pink),#A84A60);color:white;border:none;border-radius:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s;}
    .btn-next:disabled{opacity:.45;cursor:default;}
    /* ── 오답노트 ── */
    .review-card{margin-top:20px;background:#FFF0E8;border:2px solid var(--warm-pink);border-radius:18px;padding:20px;}
    .review-card .rc-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .review-card .rc-icon{font-size:28px;}
    .review-card .rc-title{font-size:17px;font-weight:700;color:var(--dark-brown);}
    .review-card .rc-sub{font-size:13px;color:var(--muted);margin-top:2px;}
    .review-card .rc-empty{text-align:center;padding:20px 0;font-size:14px;color:var(--sage);line-height:1.8;}
    .wi{background:white;border-radius:13px;padding:14px 16px;margin-bottom:10px;border:1.5px solid var(--soft-rose);transition:opacity .3s;}
    .wi .wi-lesson{font-size:11px;color:var(--warm-pink);font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
    .wi .wi-q{font-size:13px;color:var(--muted);margin-bottom:7px;line-height:1.5;}
    .wi .wi-answer{font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:700;color:var(--dark-brown);}
    .wi .wi-reading{font-size:13px;color:var(--warm-pink);margin-top:2px;}
    .wi .wi-msg{font-size:13px;color:var(--text);margin-top:8px;line-height:1.65;border-top:1px solid var(--soft-rose);padding-top:8px;}
    .wi-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:none;border:1.5px solid var(--soft-rose);border-radius:10px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
    .wi-btn:hover{border-color:var(--sage);color:var(--sage);}
    .wi.wi-cleared{opacity:.35;pointer-events:none;}
  </style>
</head>

// ── 캐릭터 ──
function showChar(img, msg, duration) {
  const i = document.getElementById('charImg');
  const b = document.getElementById('charBubble');
  if (img) { i.src = img; i.style.animation = 'none'; setTimeout(() => i.style.animation = 'charBounce .4s ease', 10); }
  if (msg) { b.innerHTML = msg; b.classList.add('show'); if (duration) setTimeout(() => b.classList.remove('show'), duration); }
  else { b.classList.remove('show'); }
}

// ── 렌더링 ──
function render() {
  const TOTAL = lesson.sections.length;
  // 도트
  const dots = document.getElementById('dots');
  dots.innerHTML = lesson.sections.map((_, i) =>
    `<div class="dot ${i < cur ? 'done' : i === cur ? 'active' : ''}"></div>`
  ).join('');
  document.getElementById('stepLabel').textContent = `ステップ ${cur + 1} / ${TOTAL}`;
  document.getElementById('backBtn').style.display = cur > 0 ? 'block' : 'none';

  const nb = document.getElementById('nextBtn');
  const nav = document.getElementById('navBar');
  const sec = lesson.sections[cur];

  if (cur === TOTAL - 1) {
    nav.style.display = 'flex';
    document.getElementById('backBtn').style.display = 'none';
    nb.disabled = false;
    nb.textContent = '🏠 ホームへ戻る';
    nb.onclick = () => { location.href = 'index.html'; };
    const c = lesson.sections[cur].character;
    if (c) showChar(c.img, c.msg, 4000);
    return;
  }
  nb.onclick = next;
  nav.style.display = 'flex';

  if (sec.type === 'pattern' && !picked) {
    nb.disabled = true; nb.textContent = '単語を選んでください 👆';
  } else if (sec.type === 'quiz' && quizDone.length < sec.questions.length) {
    nb.disabled = true; nb.textContent = 'クイズに答えてください 🧡';
  } else {
    nb.disabled = false;
    nb.textContent = cur === TOTAL - 2 ? '完了 🎉' : '次へ →';
  }

  // 캐릭터
  const c = sec.character;
  if (c) showChar(c.img, c.msg, 3000);
}

function show(n) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById(`sec-${n}`).classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
  if (n === lesson.sections.length - 1 && lesson.stage === 6) injectSeasonReview();
}

function saveProgress(done) {
  try {
    localStorage.setItem(`progress_${lesson.id}`, JSON.stringify({ done, step: cur }));
  } catch {}
}

function next() {
  if (cur < lesson.sections.length - 1) {
    cur++;
    // 마지막 스텝 직전이면 완료로 저장
    const isLast = cur === lesson.sections.length - 1;
    saveProgress(isLast);
    show(cur);
  }
}
function prev() { if (cur > 0) { cur--; show(cur); } }

    <div class="drama-box">
      <div class="d-label">🎬 ドラマでよく聞く言葉</div>
      <div class="d-kr">${s.drama.lines.join('<br>')}</div>
      <div class="d-read">${s.drama.reading}</div>
      <div class="d-jp">${s.drama.japanese}</div>
      <div class="d-note">${s.drama.note}</div>
    </div>
    <div class="card" style="margin-top:14px;">
      <div class="complete">
        <div class="big">🎉</div>
        <h2>今日もできました！</h2>
        <p>このレッスンで覚えた表現をまとめました。<br>声に出して復習してみましょう。</p>
        <div class="summary-list">
          ${s.summary.map(item => `
          <div class="s-pill">
            <span class="kr">${item.korean}</span>
            <span class="read"> · ${item.reading}</span>
          </div>`).join('')}
        </div>
        <div style="font-size:13px;color:var(--muted);">ゆっくりでいいんです。また明日！<br>천천히 해도 괜찮아요 😊</div>
      </div>
    </div>
  </div>`;
}

const builders = { phrase: buildPhrase, compare: buildCompare, pattern: buildPattern, quiz: buildQuiz, culture: buildCulture };

// ── 인터랙션 ──
function pickWord(el, kr, reading, jp, audioKey) {
  const sec = lesson.sections[cur];
  const t = sec.template;
  const krText  = t.korean.replace('___', kr);
  const rdText  = (t.readingTemplate  || '___ ジュセヨ。').replace('___', reading);
  const jpText  = (t.japaneseTemplate || '___をください。').replace('___', jp);

  document.querySelectorAll('.word-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('pDisplay').textContent = krText;
  document.getElementById('pReading').textContent = rdText;
  document.getElementById('pJp').textContent = jpText;
  document.getElementById('rKr').textContent = krText;
  document.getElementById('rRead').textContent = rdText;
  document.getElementById('rJp').textContent = jpText;
  document.getElementById('resultBox').classList.add('show');
  speak(audioKey);
  showChar(lesson.character.cheer, 'バッチリ！<br>通じますよ！', 3000);
  picked = true;
  render();
}

function answerQuiz(btn, correct, secIdx, qIdx) {
  const q = lesson.sections[secIdx].questions[qIdx];
  if (quizDone.includes(`${secIdx}-${qIdx}`)) return;
  quizDone.push(`${secIdx}-${qIdx}`);

  document.querySelectorAll(`#qopts-${secIdx}-${qIdx} .option-btn`).forEach(b => { b.classList.add('disabled'); b.onclick = null; });
  btn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) saveWrongAnswer(secIdx, qIdx);

  const result = document.getElementById(`qresult-${secIdx}-${qIdx}`);
  result.classList.add('show', correct ? 'ok' : 'ng');
  document.getElementById(`qicon-${secIdx}-${qIdx}`).textContent = correct ? '🎉' : '😊';
  document.getElementById(`qtext-${secIdx}-${qIdx}`).textContent = correct ? q.correctMsg : q.wrongMsg;
  showChar(correct ? lesson.character.correct : lesson.character.wrong, correct ? '正解！やったね！🎉' : '惜しい！<br>大丈夫ですよ！', 4000);

  // 다음 퀴즈 카드 표시
  const nextCard = document.getElementById(`qcard-${secIdx}-${qIdx + 1}`);
  if (nextCard) setTimeout(() => { nextCard.style.display = 'block'; nextCard.style.animation = 'fadeIn .4s ease'; }, 700);
  render();
}

// ── 오답노트 ──
function saveWrongAnswer(secIdx, qIdx) {
  const sec = lesson.sections[secIdx];
  const q = sec.questions[qIdx];
  const correctOption = q.options.find(o => o.correct);
  const lessonNum = parseInt(lessonId.replace('lesson', ''));
  const season = Math.ceil(lessonNum / 6);
  const key = `${lessonId}_${secIdx}_${qIdx}`;

  let wrongs = [];
  try { wrongs = JSON.parse(localStorage.getItem('wrong_answers') || '[]'); } catch {}
  if (wrongs.some(w => w.key === key)) return; // avoid duplicate
  wrongs.push({
    key,
    lessonId,
    season,
    stageTitle: lesson.stageTitle,
    icon: q.icon,
    question: q.question,
    sub: q.sub,
    wrongMsg: q.wrongMsg,
    correctKorean: correctOption ? correctOption.korean : '',
    correctReading: correctOption ? correctOption.reading : '',
    timestamp: Date.now()
  });
  try { localStorage.setItem('wrong_answers', JSON.stringify(wrongs)); } catch {}
}

function clearWrong(key) {
  const el = document.getElementById(`wi-${CSS.escape(key)}`);
  if (el) el.classList.add('wi-cleared');
  let wrongs = [];
  try { wrongs = JSON.parse(localStorage.getItem('wrong_answers') || '[]'); } catch {}
  wrongs = wrongs.filter(w => w.key !== key);
  try { localStorage.setItem('wrong_answers', JSON.stringify(wrongs)); } catch {}
}

function injectSeasonReview() {
  const lessonNum = parseInt(lessonId.replace('lesson', ''));
  const season = Math.ceil(lessonNum / 6);
  const lastSecIdx = lesson.sections.length - 1;
  const lastSec = document.getElementById(`sec-${lastSecIdx}`);
  if (!lastSec || lastSec.querySelector('.review-card')) return;

  let wrongs = [];
  try { wrongs = JSON.parse(localStorage.getItem('wrong_answers') || '[]'); } catch {}
  const seasonWrongs = wrongs.filter(w => w.season === season);

  const itemsHtml = seasonWrongs.length === 0
    ? `<div class="rc-empty">✨ 今シーズンは全問正解！<br>素晴らしいです！</div>`
    : seasonWrongs.map(w => `
      <div class="wi" id="wi-${w.key}">
        <div class="wi-lesson">${w.icon} ${w.stageTitle}</div>
        <div class="wi-q">${w.question}</div>
        <div class="wi-answer">${w.correctKorean}</div>
        <div class="wi-reading">${w.correctReading}</div>
        <div class="wi-msg">${w.wrongMsg}</div>
        <button class="wi-btn" onclick="clearWrong('${w.key}')">✅ 覚えた！</button>
      </div>`).join('');

  const card = document.createElement('div');
  card.className = 'review-card';
  card.innerHTML = `
    <div class="rc-header">
      <div class="rc-icon">📝</div>
      <div>
        <div class="rc-title">シーズン${season} · 오답노트</div>
        <div class="rc-sub">間違えた問題をおさらいしましょう</div>
      </div>
    </div>
    ${itemsHtml}`;
  lastSec.querySelector('.card:last-child')
    ? lastSec.querySelector('.card:last-child').after(card)
    : lastSec.appendChild(card);
}

// ── JSON 로드 & 초기화 ──
fetch(`lessons/${lessonId}.json`)
  .then(r => r.json())
  .then(data => {
    lesson = data;
    document.title = `${data.stageTitle} · 韓国語レッスン`;
    document.getElementById('headerBadge').textContent = `第${data.stage}課 · ${data.stageTitle}`;
    document.getElementById('headerTitle').textContent = data.appTitle;

    const container = document.getElementById('sections');
    container.innerHTML = data.sections.map((s, i) => builders[s.type](s, i)).join('');

    quizDone = [];
    picked = false;
    cur = 0;
    show(0);
  })
  .catch(e => {
    document.getElementById('sections').innerHTML = `<div style="padding:40px;text-align:center;color:red;">レッスンの読み込みに失敗しました: ${e.message}</div>`;
  });
</script>
</body>
</html>
